# Reduced memory from 8GB to 4GB to prevent disk space issues
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Pin to smaller NDK version (saves ~2GB compared to 28.x)
android.ndkVersion=25.1.8937393

# Enable caching for faster builds
org.gradle.caching=true

# Enable parallel builds
org.gradle.parallel=true

# Disable configuration cache due to compatibility issues
org.gradle.configuration-cache=false

# Note: android.bundle.enableUncompressedNativeLibs removed in AGP 8.1+
